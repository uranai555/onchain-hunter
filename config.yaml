run:
  timezone: Asia/Tokyo
  lookback_days: 90
  output_dir: reports

hyperliquid:
  enabled: true
  min_trades: 30
  cache_ttl_hours: 0      # 0 = always re-fetch; set to e.g. 12 to skip if cache is recent
  lookback_days: 90
  candidate_wallets_file: data/candidate_hyperliquid_wallets.csv
  leaderboard_collection:
    enabled: true
    max_rank: 200
    windows:
      - 7d
      - 30d
      - 90d
    run_before_scoring: true

yield:
  enabled: true
  min_tvl_usd: 5000000
  min_apy: 5
  max_apy: 40
  chains:
    - Ethereum
    - Arbitrum
    - Base
    - Optimism
    - Solana
  prefer_assets:
    - USDC
    - USDT
    - DAI
    - ETH
    - BTC

dex_wallets:
  enabled: false
  chains:
    - Solana
    - Base
  min_realized_profit_usd: 1000
  min_tokens_traded: 5
  exclude_new_wallet_days: 7
  max_single_token_profit_share: 0.5

discovery:
  enabled: true
  db_path: data/onchain_wallets.sqlite
  event_detection:
    enabled: true
    symbols:
      - BTC
      - ETH
      - SOL
    lookback_days: 7
    thresholds:
      sharp_drop: -5.0
      sharp_rise: 5.0
      major_drop: -10.0
      major_rise: 10.0

filters:
  exclude_mev: true
  exclude_deployer_related: true
  exclude_airdrop_farmers: true
  exclude_cex_wallets: true

clustering:
  enabled: true
  funding_source_lookback_hops: 2
  max_cluster_wallets_before_sybil_flag: 10
  detect_cex_proximity: true
  detect_temporal_similarity: true
  detect_contract_interaction_similarity: true

scoring:
  gaming_resistance_enabled: true
  strategy_complexity_enabled: true
  cross_pool_exposure_enabled: true
  crowding_penalty_enabled: true
  thresholds:
    realized_pnl_high: 50000
    risk_adjusted_return_high: 5
    notional_median_low: 100000
    notional_median_high: 2000000
    lot_cv_target: 1.0
    lot_cv_penalty_coefficient: 35
    return_skew_penalty_coefficient: 15
    max_trade_profit_penalty_coefficient: 35
    interval_cv_target: 1.0
    interval_cv_penalty_coefficient: 30
    notional_p95_low: 250000
    notional_p95_high: 5000000
    max_trade_profit_share_exclusion: 0.5
    max_coin_profit_share_exclusion: 0.6
    min_profit_factor: 1.2
    unrealized_loss_to_profit_exclusion: 0.5
    rank_a_min: 80
    rank_b_min: 65
    rank_c_min: 50

reports:
  hyperliquid_top_wallets_daily: true
  hyperliquid_wallet_profiles_csv: true
  defi_yield_watchlist: true
  dex_smart_wallets: true
  copyability_backtest: true

notification:
  enabled: false
  webhook_url: ""        # Discord or Slack webhook URL
  on_completion: true
  on_error: true
